name: All Model Unit Tests

on:
  push:
    branches:
      - test
  pull_request:
    branches:
      - test

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m venv venv
        source venv/bin/activate
        pip install -r requirements.txt

    - name: Download models from GitHub Releases
      run: |
        wget -O models/gru_model.h5 "https://github.com/YOUR_USERNAME/YOUR_REPO/releases/download/v1.0/gru_model.h5"
        wget -O models/vgg_model.h5 "https://github.com/YOUR_USERNAME/YOUR_REPO/releases/download/v1.0/vgg_model.h5"
        wget -O models/rnn_model.h5 "https://github.com/YOUR_USERNAME/YOUR_REPO/releases/download/v1.0/rnn_model.h5"
        wget -O models/mobilenet_model.h5 "https://github.com/YOUR_USERNAME/YOUR_REPO/releases/download/v1.0/mobilenet_model.h5"

    - name: Run all unit tests
      run: |
        source venv/bin/activate
        pytest tests/ --disable-warnings
