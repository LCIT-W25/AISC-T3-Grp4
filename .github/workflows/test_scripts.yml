name: Run Unit Tests

on:
  push:
    branches:
      - test  # This will trigger the workflow when you push to 'test' branch
  pull_request:
    branches:
      - test  # This will trigger the workflow on PR to 'test' branch

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m venv venv
        source venv/bin/activate
        pip install -r requirements.txt

    - name: Run unit tests
      run: |
        source venv/bin/activate
        pytest tests/ -s -v  # Run tests in the 'tests/' folder
