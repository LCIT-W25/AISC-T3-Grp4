name: CI/CD Pipeline for ML Model

on:
  push:
    branches:
      - dev  # Trigger pipeline on pushes to the main branch
  pull_request:
    branches:
      - dev  # Trigger pipeline on pull requests to the main branch

jobs:
  validate:
    runs-on: ubuntu-latest  # Use the latest Ubuntu environment

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3  # Check out the code

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'  # Specify your Python version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Model
        run: |
          python -c "from tensorflow.keras.models import load_model; model = load_model('models/MobileNetV2.h5'); print('Model loaded successfully!')"

      - name: Upload Model as Artifact
        uses: actions/upload-artifact@v3
        with:
          name: model
          path: models/MobileNetV2.h5
