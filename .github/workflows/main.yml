name: CI/CD Pipeline for ML Model

on:
  push:
    branches:
      - main  # Trigger pipeline on pushes to the main branch
  pull_request:
    branches:
      - main  # Trigger pipeline on pull requests to the main branch

jobs:
  validate:
    runs-on: ubuntu-latest  # Use the latest Ubuntu environment

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3  # Check out the code

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'  # Specify your Python version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Model
        run: |
          python -c "from tensorflow.keras.models import load_model; model = load_model('models/model.h5'); print('Model loaded successfully!')"

  deploy:
    needs: validate  # Ensure the deploy job runs only if the validate job succeeds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy Model
        run: |
          # Add deployment steps here
          echo "Deploying model..."
          # Example: Upload the model to a cloud storage bucket
          # aws s3 cp models/model.h5 s3://your-bucket-name/path/to/model.h5
